{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hikma.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hikma.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayClassName }}
      namespace: {{ .Values.gateway.namespace | default .Values.namespace }}
      sectionName: http
      port: 80
    - name: {{ .Values.gateway.gatewayClassName }}
      namespace: {{ .Values.gateway.namespace | default .Values.namespace }}
      sectionName: https
      port: 443
  hostnames:
    - {{ .Values.gateway.host }}
  rules:
    - backendRefs:
        - name: {{ include "hikma.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 100
      {{- if .Values.gateway.path }}
      matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.path }}
      {{- end }}
{{- end }}