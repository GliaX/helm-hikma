name: Build and Deploy Hikma Health Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gliax/hikma-health-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout hikma-health-server source
        uses: actions/checkout@v4
        with:
          repository: hikmahealth/hikma-health-server
          token: ${{ secrets.HIKMA_REPO_TOKEN }}
          path: hikma-health-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create Dockerfile
        run: |
          cat > hikma-health-server/Dockerfile << 'EOF'
          # Build stage
          FROM node:24.14.0-alpine AS builder
          
          # Install git for lefthook
          RUN apk add --no-cache git
          
          WORKDIR /app
          
          # Install pnpm
          RUN corepack enable && corepack prepare pnpm@latest --activate
          
          # Copy package files
          COPY package.json pnpm-lock.yaml ./
          
          # Install dependencies (skip prepare script to avoid lefthook)
          RUN pnpm install --frozen-lockfile --ignore-scripts
          
          # Copy source code
          COPY . .
          
          # Build the application
          RUN pnpm run build
          
          # Production stage
          FROM node:24.14.0-alpine AS production
          
          WORKDIR /app
          
          # Install pnpm
          RUN corepack enable && corepack prepare pnpm@latest --activate
          
          # Copy package files
          COPY package.json pnpm-lock.yaml ./
          
          # Install production dependencies only (skip prepare script)
          RUN pnpm install --prod --frozen-lockfile --ignore-scripts
          
          # Copy built application from builder
          COPY --from=builder /app/.output .output
          COPY --from=builder /app/node_modules .node_modules
          
          # Set environment variables
          ENV NODE_ENV=production
          ENV NODE_OPTIONS="--max-old-space-size=5120"
          
          # Expose port
          EXPOSE 3000
          
          # Run the application
          CMD ["pnpm", "run", "start-only"]
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: hikma-health-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout helm chart
        uses: actions/checkout@v4
        with:
          path: helm-hikma

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.13.0"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Create namespace if not exists
        run: |
          kubectl create namespace hikma --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret for GHCR
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=gliax \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            -n hikma \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create DATABASE_URL secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            kubectl create secret generic hikma-db-credentials \
              --from-literal=DATABASE_URL="$DATABASE_URL" \
              -n hikma \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "WARNING: DATABASE_URL secret not set in GitHub secrets"
          fi

      - name: Update values with image tag
        run: |
          cd helm-hikma
          # Get the image tag from the build job
          IMAGE_TAG="${{ github.sha }}"
          # Use | as delimiter to avoid conflicts with / in paths
          sed -i "s|tag: .*|tag: $IMAGE_TAG|" values.yaml
          # Update gateway host if provided and valid
          GATEWAY_HOST="${{ secrets.GATEWAY_HOST }}"
          if [ -n "$GATEWAY_HOST" ] && [ "$GATEWAY_HOST" != "***" ]; then
            sed -i "s|host: .*|host: $GATEWAY_HOST|" values.yaml
          fi

      - name: Deploy to Kubernetes
        run: |
          cd helm-hikma
          helm upgrade --install hikma . \
            --namespace hikma \
            --create-namespace \
            
            

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl get deployment hikma-hikma -n hikma
          echo ""
          echo "Checking pods..."
          kubectl get pods -n hikma -l app.kubernetes.io/name=hikma
          echo ""
          echo "Checking services..."
          kubectl get svc -n hikma

      - name: Check pod logs for errors
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=hikma \
            -n hikma --timeout=300s || true
          
          # Get logs from the first pod
          POD_NAME=$(kubectl get pod -l app.kubernetes.io/name=hikma -n hikma -o jsonpath='{.items[0].metadata.name}')
          if [ -n "$POD_NAME" ]; then
            echo "Logs from $POD_NAME:"
            kubectl logs $POD_NAME -n hikma --tail=50 || true
          fi
      - name: Check pod status
        run: |
          echo "Checking pods..."
          kubectl get pods -n hikma -o wide
          echo ""
          echo "Checking deployment..."
          kubectl get deployment hikma-hikma -n hikma
          echo ""
          echo "Checking events..."
          kubectl get events -n hikma --sort-by='.lastTimestamp' | tail -20

      - name: Get pod logs
        run: |
          POD_NAME=$(kubectl get pod -l app.kubernetes.io/name=hikma -n hikma -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$POD_NAME" ]; then
            echo "Logs from $POD_NAME:"
            kubectl logs $POD_NAME -n hikma --tail=100 || echo "Could not get logs"
          else
            echo "No pods found"
          fi
EOF; __hermes_rc=$?; printf '__HERMES_FENCE_a9f7b3__'; exit $__hermes_rc
